services:
  app:
    image: ishakantony/snippaste:latest
    restart: unless-stopped
    ports:
      - '${PORT:-7777}:7777'
    environment:
      DB_PATH: /data/snippaste.db
      FEATURE_QR_CODE: "true"
      FEATURE_LANGUAGE_SWITCHER: "true"
      FEATURE_AUTO_SAVE: "true"
      FEATURE_PASSWORD_PROTECTION: "true"
      SESSION_SECRET: "change-this-to-a-long-random-secret"
    volumes:
      - snipdata:/data

volumes:
  snipdata:
